<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة متابعة المتاجر — حِرف</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#2E4F4F; --teal-700:#264242; --teal-300:#5C7A7A;
    --gold:#D88935; --gold-soft:#E8A85C;
    --beige:#FCF6F6; --card:#FFFFFF;
    --ink:#1F2D2D; --muted:#7C8B8B; --line:#ECE4E4;
    --ok:#3F9D6B; --warn:#D88935; --wait:#C0584B;
    --shadow:0 1px 3px rgba(46,79,79,.06),0 8px 24px rgba(46,79,79,.06);
    --shadow-lg:0 12px 40px rgba(46,79,79,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;background:var(--beige);color:var(--ink);line-height:1.6;-webkit-font-smoothing:antialiased}

  header{background:var(--teal);color:#fff;padding:20px 24px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(46,79,79,.2)}
  .head-wrap{max-width:1280px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
  .brand{display:flex;align-items:center;gap:12px}
  .brand .logo{font-size:26px;font-weight:700;letter-spacing:1px}
  .brand .logo b{color:var(--gold)}
  .brand .sub{font-size:12.5px;color:#B9C9C9;font-weight:300;border-right:2px solid var(--gold);padding-right:12px}
  .head-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
  .btn{font-family:inherit;font-size:14px;font-weight:500;border:none;border-radius:10px;padding:10px 18px;cursor:pointer;transition:.18s;display:inline-flex;align-items:center;gap:7px}
  .btn-gold{background:var(--gold);color:#fff}
  .btn-gold:hover{background:var(--gold-soft)}
  .btn-ghost{background:rgba(255,255,255,.12);color:#fff}
  .btn-ghost:hover{background:rgba(255,255,255,.22)}

  .sync{font-size:12px;color:#B9C9C9;display:flex;align-items:center;gap:6px}
  .sync .dot{width:8px;height:8px;border-radius:50%;background:#7C8B8B}
  .sync.ok .dot{background:#5FD89A}
  .sync.err .dot{background:#FF7A6B}
  .sync.loading .dot{background:var(--gold);animation:pulse 1s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .stats{max-width:1280px;margin:24px auto 0;padding:0 24px;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
  .stat{background:var(--card);border-radius:14px;padding:16px 18px;box-shadow:var(--shadow);border:1px solid var(--line)}
  .stat .n{font-size:26px;font-weight:700;color:var(--teal)}
  .stat .l{font-size:13px;color:var(--muted)}
  .stat.accent .n{color:var(--gold)}

  .container{max-width:1280px;margin:0 auto;padding:24px}
  .toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px;flex-wrap:wrap}
  .toolbar h2{font-size:18px;font-weight:600;color:var(--teal)}
  .search{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:10px 14px;width:240px;background:#fff;color:var(--ink)}
  .search:focus{outline:2px solid var(--gold);outline-offset:1px}

  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}

  .card{background:var(--card);border-radius:16px;padding:18px;box-shadow:var(--shadow);border:1px solid var(--line);cursor:pointer;transition:.2s;position:relative;overflow:hidden}
  .card:hover{transform:translateY(-3px);box-shadow:var(--shadow-lg);border-color:var(--gold-soft)}
  .card.done-card{border-color:#CDE9D7;background:linear-gradient(180deg,#fff,#F8FCF9)}
  .card::before{content:'';position:absolute;inset-block:0;inset-inline-start:0;width:4px;background:var(--gold);opacity:0;transition:.2s}
  .card:hover::before{opacity:1}
  .card.done-card::before{background:var(--ok);opacity:1}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:14px}
  .card-name{font-size:17px;font-weight:600;color:var(--ink)}
  .card-pkg{font-size:11.5px;color:var(--teal);background:#EAF1F0;padding:3px 9px;border-radius:20px;font-weight:500;white-space:nowrap}
  .badge{font-size:11px;font-weight:600;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .badge.ok{background:#E4F3EB;color:var(--ok)}
  .badge.warn{background:#FBEEDF;color:var(--warn)}
  .badge.wait{background:#F8E6E3;color:var(--wait)}
  .badge.done{background:var(--ok);color:#fff}

  .dates{display:flex;gap:14px;margin-bottom:12px}
  .date-item{flex:1}
  .date-item .lab{font-size:11px;color:var(--muted)}
  .date-item .val{font-size:13px;font-weight:500;color:var(--ink)}

  .money{display:flex;gap:10px;margin-bottom:14px;background:var(--beige);border-radius:10px;padding:10px 12px}
  .money div{flex:1}
  .money .lab{font-size:11px;color:var(--muted)}
  .money .val{font-size:15px;font-weight:700}
  .money .paid .val{color:var(--ok)}
  .money .rem .val{color:var(--gold)}
  .money .rem.zero .val{color:var(--ok)}

  .stage-wrap{margin-top:4px}
  .stage-bar{display:flex;gap:3px;margin-bottom:8px}
  .seg{height:6px;flex:1;background:var(--line);border-radius:3px;transition:.3s}
  .seg.done{background:var(--teal)}
  .seg.current{background:var(--gold)}
  .stage-now{font-size:12.5px;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .stage-now .cur{color:var(--gold);font-weight:600}
  .stage-now .cur.fin{color:var(--ok)}
  .stage-now .prog{color:var(--muted);font-size:11.5px;white-space:nowrap}

  .overlay{position:fixed;inset:0;background:rgba(31,45,45,.55);backdrop-filter:blur(3px);z-index:100;display:none;align-items:flex-start;justify-content:center;padding:24px;overflow-y:auto}
  .overlay.open{display:flex}
  .modal{background:var(--beige);border-radius:20px;max-width:720px;width:100%;margin:auto;box-shadow:var(--shadow-lg);animation:pop .22s ease}
  @keyframes pop{from{opacity:0;transform:scale(.96) translateY(10px)}to{opacity:1;transform:none}}
  .modal-head{background:var(--teal);color:#fff;padding:22px 26px;border-radius:20px 20px 0 0;position:relative}
  .modal-head h2{font-size:22px;font-weight:600}
  .modal-head .pkg{font-size:13px;color:var(--gold-soft);margin-top:3px}
  .close{position:absolute;inset-block-start:18px;inset-inline-start:20px;background:rgba(255,255,255,.15);border:none;color:#fff;width:34px;height:34px;border-radius:9px;cursor:pointer;font-size:18px;transition:.18s}
  .close:hover{background:rgba(255,255,255,.28)}
  .modal-body{padding:24px 26px}

  /* تبويبات */
  .tabs{display:flex;gap:4px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:4px;margin-bottom:18px}
  .tab{flex:1;font-family:inherit;font-size:13.5px;font-weight:600;border:none;background:none;color:var(--muted);padding:10px;border-radius:9px;cursor:pointer;transition:.16s}
  .tab.active{background:var(--teal);color:#fff}

  .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:8px}
  .info{background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px}
  .info .lab{font-size:11.5px;color:var(--muted);margin-bottom:2px}
  .info .val{font-size:15px;font-weight:600;color:var(--ink)}

  .sec-title{font-size:15px;font-weight:600;color:var(--teal);margin:22px 0 14px;display:flex;align-items:center;gap:8px}
  .sec-title:first-child{margin-top:0}
  .sec-title::before{content:'';width:4px;height:16px;background:var(--gold);border-radius:2px}

  .phase-rail{display:flex;gap:6px;margin-bottom:18px;overflow-x:auto;padding-bottom:6px}
  .phase-chip{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;min-width:66px;opacity:.5;transition:.18s;background:none;border:none;font-family:inherit}
  .phase-chip.active{opacity:1}
  .phase-chip.done{opacity:1}
  .phase-chip .pnum{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;border:2px solid var(--line);background:#fff;color:var(--muted)}
  .phase-chip.done .pnum{background:var(--teal);border-color:var(--teal);color:#fff}
  .phase-chip.active .pnum{background:var(--gold);border-color:var(--gold);color:#fff;box-shadow:0 0 0 4px rgba(216,137,53,.18)}
  .phase-chip .pname{font-size:10.5px;text-align:center;color:var(--muted);line-height:1.3;max-width:78px}
  .phase-chip.active .pname{color:var(--gold);font-weight:600}
  .phase-chip.done .pname{color:var(--teal)}

  .phase-open{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:16px}
  .phase-open .po-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;flex-wrap:wrap;gap:8px}
  .phase-open h3{font-size:17px;color:var(--teal);font-weight:600}
  .phase-open .po-count{font-size:12.5px;color:var(--muted);background:var(--beige);padding:4px 10px;border-radius:20px}
  .phase-open .po-bar{height:6px;background:var(--line);border-radius:3px;overflow:hidden;margin-top:8px}
  .phase-open .po-fill{height:100%;background:var(--gold);border-radius:3px;transition:.3s}

  .tasks{display:flex;flex-direction:column;gap:8px;margin-top:6px}
  .task{display:flex;align-items:center;gap:12px;background:#fff;border:1px solid var(--line);border-radius:12px;padding:12px 14px;transition:.15s}
  .task.done{background:#F4FAF6;border-color:#CDE9D7}
  .task .t-label{flex:1;font-size:14px;color:var(--ink)}
  .task.done .t-label{color:var(--muted);text-decoration:line-through}
  .task .t-btn{font-family:inherit;font-size:13px;font-weight:600;border:none;border-radius:9px;padding:8px 16px;cursor:pointer;transition:.16s;white-space:nowrap}
  .task .t-btn.send{background:var(--gold);color:#fff}
  .task .t-btn.send:hover{background:var(--gold-soft)}
  .task .t-btn.undo{background:#EAF1F0;color:var(--teal)}
  .task .t-btn.undo:hover{background:#DCE8E6}
  .task .t-check{width:24px;height:24px;border-radius:50%;background:var(--ok);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}

  .phase-nav{display:flex;gap:8px;margin-top:16px}
  .phase-nav .btn{flex:1;justify-content:center}

  /* البريف */
  .brief-field{margin-bottom:14px}
  .brief-field label{display:block;font-size:13px;font-weight:600;color:var(--teal);margin-bottom:5px}
  .brief-field textarea,.brief-field input{width:100%;font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink);resize:vertical}
  .brief-field textarea:focus,.brief-field input:focus{outline:2px solid var(--gold);outline-offset:1px}
  .brief-hint{font-size:11.5px;color:var(--muted);margin-top:3px}
  .brief-save{display:flex;gap:8px;margin-top:6px}

  /* الدفعات */
  .pay-add{background:#fff;border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:14px}
  .pay-add-row{display:flex;gap:8px;align-items:flex-end}
  .pay-add-row .field{flex:1}
  .pay-add-row label{font-size:12.5px;font-weight:600;color:var(--teal);display:block;margin-bottom:5px}
  .pay-add-row input{width:100%;font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff}
  .pay-add-row input:focus{outline:2px solid var(--gold);outline-offset:1px}
  .pay-btn{background:var(--ok);color:#fff;border:none;border-radius:10px;padding:11px 18px;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.16s}
  .pay-btn:hover{background:#358a5b}
  .pay-list{display:flex;flex-direction:column;gap:8px}
  .pay-item{display:flex;justify-content:space-between;align-items:center;background:#F4FAF6;border:1px solid #CDE9D7;border-radius:10px;padding:11px 14px}
  .pay-item .pi-amt{font-weight:700;color:var(--ok);font-size:15px}
  .pay-item .pi-date{font-size:12px;color:var(--muted)}
  .pay-item .pi-del{background:none;border:none;color:var(--wait);cursor:pointer;font-size:14px;opacity:.6}
  .pay-item .pi-del:hover{opacity:1}
  .pay-summary{display:flex;gap:10px;margin-top:14px}
  .pay-summary .ps{flex:1;text-align:center;background:#fff;border:1px solid var(--line);border-radius:10px;padding:12px}
  .pay-summary .ps .l{font-size:11.5px;color:var(--muted)}
  .pay-summary .ps .v{font-size:17px;font-weight:700}
  .pay-summary .ps.paid .v{color:var(--ok)}
  .pay-summary .ps.rem .v{color:var(--gold)}
  .pay-summary .ps.rem.zero .v{color:var(--ok)}

  /* زر الإتمام */
  .finish-box{margin-top:8px;padding:18px;border-radius:14px;text-align:center}
  .finish-locked{background:#F6F1F0;border:1px dashed #D9C9C7}
  .finish-locked .fl-ic{font-size:28px;opacity:.5;margin-bottom:6px}
  .finish-locked .fl-title{font-size:14px;font-weight:600;color:var(--muted)}
  .finish-locked .fl-sub{font-size:12.5px;color:var(--muted);margin-top:4px}
  .finish-ready{background:#EAF7F0;border:1px solid #BCE3CD}
  .finish-ready .fr-title{font-size:14px;color:var(--ok);font-weight:600;margin-bottom:10px}
  .btn-finish{background:var(--ok);color:#fff;border:none;border-radius:11px;padding:13px 28px;font-family:inherit;font-size:15px;font-weight:600;cursor:pointer;transition:.16s}
  .btn-finish:hover{background:#358a5b}
  .finish-done{background:var(--ok);color:#fff;border-radius:14px;padding:18px;text-align:center}
  .finish-done .fd-ic{font-size:30px;margin-bottom:4px}
  .finish-done .fd-title{font-size:16px;font-weight:600}

  .modal-foot{padding:18px 26px;border-top:1px solid var(--line);display:flex;gap:10px;justify-content:space-between;flex-wrap:wrap}
  .btn-danger{background:#F8E6E3;color:var(--wait)}
  .btn-danger:hover{background:#F1D6D1}
  .btn-teal{background:var(--teal);color:#fff}
  .btn-teal:hover{background:var(--teal-700)}

  .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
  .field{display:flex;flex-direction:column;gap:5px}
  .field.full{grid-column:1/-1}
  .field label{font-size:13px;font-weight:500;color:var(--teal)}
  .field input,.field select{font-family:inherit;font-size:14px;border:1px solid var(--line);border-radius:10px;padding:10px 12px;background:#fff;color:var(--ink)}
  .field input:focus,.field select:focus{outline:2px solid var(--gold);outline-offset:1px}

  .empty{text-align:center;padding:70px 20px;color:var(--muted)}
  .empty .ic{font-size:46px;margin-bottom:12px;opacity:.5}
  .empty h3{font-size:18px;color:var(--teal);margin-bottom:6px;font-weight:600}
  .loader{text-align:center;padding:80px 20px;color:var(--muted)}
  .spinner{width:40px;height:40px;border:3px solid var(--line);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
  @keyframes spin{to{transform:rotate(360deg)}}

  @media(max-width:680px){
    .stats{grid-template-columns:repeat(2,1fr)}
    .info-grid,.form-grid{grid-template-columns:1fr}
    .search{width:100%}
    .pay-add-row{flex-direction:column;align-items:stretch}
  }
  @media print{
    header,.stats,.toolbar,.tabs,.phase-rail,.phase-nav,.modal-foot,.close,.pay-add,.pi-del,.finish-box,.brief-save{display:none!important}
    body,.overlay,.modal{background:#fff!important;position:static!important}
    .overlay{display:block!important;padding:0}
  }
</style>
</head>
<body>

<header>
  <div class="head-wrap">
    <div class="brand">
      <div class="logo">حِـ<b>رف</b></div>
      <div class="sub">لوحة متابعة المتاجر</div>
    </div>
    <div class="head-actions">
      <div class="sync" id="syncStatus"><span class="dot"></span><span id="syncText">جاري الاتصال…</span></div>
      <button class="btn btn-gold" onclick="openForm()">＋ متجر جديد</button>
    </div>
  </div>
</header>

<div class="stats" id="stats"></div>

<div class="container">
  <div class="toolbar">
    <h2>المشاريع</h2>
    <input class="search" id="search" placeholder="🔍 ابحث باسم المتجر..." oninput="render()">
  </div>
  <div id="grid"><div class="loader"><div class="spinner"></div>جاري تحميل المشاريع…</div></div>
</div>

<div class="overlay" id="detailOverlay"><div class="modal" id="detailModal"></div></div>

<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="formTitle">متجر جديد</h2>
      <button class="close" onclick="closeForm()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="field full"><label>اسم المتجر</label><input id="f-name" placeholder="مثال: رامانوا للفساتين"></div>
        <div class="field"><label>الباقة</label>
          <select id="f-pkg">
            <option value="رقمية">رقمية — 999</option>
            <option value="نواة">نواة — 1499</option>
            <option value="نمو">نمو — 2199</option>
            <option value="ازدهار">ازدهار — 4499</option>
          </select>
        </div>
        <div class="field"><label>السعر الإجمالي للمشروع (ر.س)</label><input id="f-total" type="number" min="0" placeholder="مثال: 2499"></div>
        <div class="field"><label>تاريخ الاستلام</label><input id="f-start" type="date"></div>
        <div class="field"><label>تاريخ التسليم المتوقع</label><input id="f-end" type="date"></div>
        <div class="field full"><label>ملاحظات (اختياري)</label><input id="f-note" placeholder="أي تفاصيل سريعة..."></div>
      </div>
      <p style="font-size:12.5px;color:var(--muted);margin-top:6px">💡 الدفعات تُسجَّل بعد الإنشاء من تبويب «الدفعات» داخل المشروع.</p>
    </div>
    <div class="modal-foot">
      <span></span>
      <button class="btn btn-teal" id="saveBtn" onclick="saveProject()">حفظ المشروع</button>
    </div>
  </div>
</div>

<script>
/* ============================================
   🔐 ضع هنا نفس مفتاح الحماية الموجود في config.php
   ⚠️ استخدم حروفًا وأرقامًا لاتينية فقط (بدون عربي) —
      لأن المفتاح يُرسل ضمن ترويسة HTTP لا تقبل سوى Latin-1.
   ============================================ */
const AUTH_KEY = 'change-this-to-a-long-secret-2026';
const API = 'api.php';

/* المراحل السبع + المهام الفرعية */
const PHASES = [
  { name:"الاتفاق والاستلام", tasks:[
    "تأكيد استلام العربون/الدفعة","تحديد موعد الاجتماع الأول مع العميل",
    "إرسال بريف الاستلام للعميل","توقيع الاتفاق وتوضيح نطاق الباقة"
  ]},
  { name:"فهم العميل وجمع المتطلبات", tasks:[
    "فهم توجّه العميل ونوع نشاطه وجمهوره","تحديد المنتج/العرض المراد إبرازه",
    "حصر المتطلبات الرسمية: وثيقة عمل حر / سجل تجاري","حصر الحساب البنكي + شهادة الآيبان (مطابقة للاسم)",
    "استلام هوية المتجر: الاسم، الشعار، الألوان","استلام صور وبيانات المنتجات (أسماء، أسعار، تصنيفات)",
    "تحديد مناطق الشحن وسياسات الإرجاع","أخذ صلاحيات الدخول وحسابات التواصل"
  ]},
  { name:"التأسيس النظامي", tasks:[
    "إنشاء المتجر على المنصة (سلة/زد)","رفع طلب التوثيق ومتابعة قبوله",
    "تفعيل وسائل الدفع (مدى، STC Pay، Apple Pay، تمارا/تابي)","إعداد وربط شركات الشحن",
    "حجز وربط النطاق (إن وُجد بالباقة)"
  ]},
  { name:"التصميم وإضافة المنتجات", tasks:[
    "ترتيب وتجهيز واجهة المتجر","تصميم البنرات (حسب عدد الباقة)",
    "إضافة المنتجات وكتابة محتواها","إنشاء الأقسام والتصنيفات",

let projects=[];
let editingId=null;

function setSync(state,text){
  document.getElementById('syncStatus').className='sync '+state;
  document.getElementById('syncText').textContent=text;
}

async function apiCall(action,method='GET',body=null,extra=''){
  const opts={method,headers:{'X-Auth-Key':AUTH_KEY,'Content-Type':'application/json'}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(`${API}?action=${action}${extra}`,opts);
  if(!res.ok) throw new Error('خطأ في الخادم ('+res.status+')');
  return res.json();
}

async function loadProjects(){
  setSync('loading','جاري المزامنة…');
  try{
    const r=await apiCall('list');
    if(r.error) throw new Error(r.error);
    projects=(r.data||[]).map(normalize);
    setSync('ok','متزامن ✓');
    render();
  }catch(e){
    setSync('err','تعذّر الاتصال');
    document.getElementById('grid').innerHTML=`<div class="empty"><div class="ic">⚠️</div>
      <h3>تعذّر الاتصال بقاعدة البيانات</h3>
      <p>تأكد من: رفع الملفات، صحة بيانات config.php، وتطابق مفتاح الحماية.<br>التفاصيل: ${esc(e.message)}</p></div>`;
  }
}

function normalize(p){
  if(!Array.isArray(p.checks) || !Array.isArray(p.checks[0])){
    p.checks = PHASES.map(ph=>new Array(ph.tasks.length).fill(false));
  }else{
    p.checks = PHASES.map((ph,i)=>{ const arr=p.checks[i]||[]; return ph.tasks.map((_,j)=>!!arr[j]); });
  }
  if(!p.brief || typeof p.brief!=='object') p.brief={};
  if(!Array.isArray(p.payments)) p.payments=[];
  p.completed=p.completed?1:0;
  // total = السعر الإجمالي. نشتقّه إن لم يوجد من (المدفوع + المتبقي القديم)
  if(p.total===undefined||p.total===null){
    p.total = (Number(p.paid)||0) + (Number(p.rem)||0);
  }
  p.stage=currentPhase(p);
  return p;
}

function currentPhase(p){
  for(let i=0;i<PHASES.length;i++){ if(p.checks[i].some(x=>!x)) return i; }
  return PHASES.length-1;
}
function phaseComplete(p,i){ return p.checks[i].every(x=>x); }
function allTasksDone(p){ return p.checks.every(arr=>arr.every(x=>x)); }
function totalPaid(p){ return (p.payments||[]).reduce((s,x)=>s+(Number(x.amount)||0),0); }
function remaining(p){ return Math.max(0,(Number(p.total)||0)-totalPaid(p)); }
function canFinish(p){ return allTasksDone(p) && remaining(p)<=0 && (Number(p.total)||0)>0; }

function fmtDate(d){ if(!d) return '—'; const p=d.split('-'); return p.length===3? `${p[2]}/${p[1]}/${p[0]}`:'—'; }
function fmtMoney(n){ return (Number(n)||0).toLocaleString('en-US'); }
function esc(s){ return String(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function projProgress(p){
  let total=0,done=0;
  p.checks.forEach(arr=>{ total+=arr.length; done+=arr.filter(Boolean).length; });
  return {done,total,pct:total?Math.round(done/total*100):0};
}
function stageBadge(p){
  if(p.completed) return['done','مُسلّم ✓'];
  if(currentPhase(p)>=3) return['warn','قيد التنفيذ'];
  return['wait','بالانتظار'];
}

function renderStats(){
  const total=projects.length,
        active=projects.filter(p=>!p.completed).length,
        done=projects.filter(p=>p.completed).length,
        due=projects.reduce((s,p)=>s+remaining(p),0);
  document.getElementById('stats').innerHTML=`
    <div class="stat"><div class="n">${total}</div><div class="l">إجمالي المتاجر</div></div>
    <div class="stat"><div class="n">${active}</div><div class="l">قيد العمل</div></div>
    <div class="stat"><div class="n">${done}</div><div class="l">مُسلّمة</div></div>
    <div class="stat accent"><div class="n">${fmtMoney(due)}</div><div class="l">مبالغ متبقية (ر.س)</div></div>`;
}

function render(){
  renderStats();
  const q=(document.getElementById('search').value||'').trim();
  const grid=document.getElementById('grid');
  const list=projects.filter(p=>p.name.includes(q));
  grid.className='grid';
  if(list.length===0){
    grid.className='';
    grid.innerHTML=`<div class="empty"><div class="ic">🏪</div>
      <h3>${projects.length===0?'ابدأ بإضافة أول متجر':'لا نتائج للبحث'}</h3>
      <p>${projects.length===0?'اضغط «متجر جديد» لإضافة مشروعك الأول':'جرّب اسمًا آخر'}</p></div>`;
    return;
  }
  grid.innerHTML=list.map(p=>{
    const [bc,bt]=stageBadge(p);
    const cur=currentPhase(p);
    const rem=remaining(p);
    const segs=PHASES.map((_,i)=>{
      const cls=phaseComplete(p,i)?'done':(i===cur&&!p.completed?'current':'');
      return `<div class="seg ${cls}"></div>`;
    }).join('');
    const pr=projProgress(p);
    const curLabel = p.completed ? 'مُسلّم للعميل ✓' : PHASES[cur].name;
    return `<div class="card ${p.completed?'done-card':''}" onclick="openDetail('${p.id}')">
      <div class="card-top"><div><div class="card-name">${esc(p.name)}</div></div><span class="badge ${bc}">${bt}</span></div>
      <div style="margin-bottom:12px"><span class="card-pkg">باقة ${p.pkg}</span></div>
      <div class="dates">
        <div class="date-item"><div class="lab">الاستلام</div><div class="val">${fmtDate(p.start)}</div></div>
        <div class="date-item"><div class="lab">التسليم</div><div class="val">${fmtDate(p.end)}</div></div>
      </div>
      <div class="money">
        <div class="paid"><div class="lab">مدفوع</div><div class="val">${fmtMoney(totalPaid(p))}</div></div>
        <div class="rem ${rem<=0?'zero':''}"><div class="lab">متبقٍ</div><div class="val">${fmtMoney(rem)}</div></div>
      </div>
      <div class="stage-wrap"><div class="stage-bar">${segs}</div>
        <div class="stage-now"><span class="cur ${p.completed?'fin':''}">${curLabel}</span><span class="prog">${pr.done}/${pr.total} مهمة</span></div></div>
    </div>`;
  }).join('');
}

/* ===== التفاصيل (بتبويبات) ===== */
function openDetail(id){
  const p=projects.find(x=>x.id===id); if(!p) return;
  if(activeTab[id]===undefined) activeTab[id]='tasks';
  if(openPhaseIdx[id]===undefined) openPhaseIdx[id]=currentPhase(p);
  const pr=projProgress(p);
  const tab=activeTab[id];

  let bodyHtml='';
  if(tab==='tasks') bodyHtml=renderTasksTab(p,id);
  else if(tab==='brief') bodyHtml=renderBriefTab(p,id);
  else if(tab==='pay') bodyHtml=renderPayTab(p,id);

  document.getElementById('detailModal').innerHTML=`
    <div class="modal-head"><h2>${esc(p.name)}</h2>
      <div class="pkg">باقة ${p.pkg} • ${pr.done}/${pr.total} مهمة (${pr.pct}%)</div>
      <button class="close" onclick="closeDetail()">✕</button></div>
    <div class="modal-body">
      <div class="tabs">
        <button class="tab ${tab==='tasks'?'active':''}" onclick="setTab('${id}','tasks')">المراحل والمهام</button>
        <button class="tab ${tab==='brief'?'active':''}" onclick="setTab('${id}','brief')">بريف العميل</button>
        <button class="tab ${tab==='pay'?'active':''}" onclick="setTab('${id}','pay')">الدفعات</button>
      </div>
      ${bodyHtml}
    </div>
    <div class="modal-foot">
      <button class="btn btn-danger" onclick="delProject('${id}')">🗑 حذف</button>
      <button class="btn btn-teal" onclick="editProject('${id}')">✎ تعديل البيانات</button>
    </div>`;
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetail(){ document.getElementById('detailOverlay').classList.remove('open'); }
function setTab(id,t){ activeTab[id]=t; openDetail(id); }
function switchPhase(id,i){ openPhaseIdx[id]=i; openDetail(id); }

/* تبويب المهام */
function renderTasksTab(p,id){
  const viewIdx=openPhaseIdx[id];
  const rail=PHASES.map((ph,i)=>{
    const cls=phaseComplete(p,i)?'done':(i===viewIdx?'active':'');
    const mark=phaseComplete(p,i)?'✓':(i+1);
    return `<button class="phase-chip ${cls}" onclick="switchPhase('${id}',${i})">
      <div class="pnum">${mark}</div><div class="pname">${ph.name}</div></button>`;
  }).join('');
  const ph=PHASES[viewIdx];
  const phDone=p.checks[viewIdx].filter(Boolean).length;
  const phPct=Math.round(phDone/ph.tasks.length*100);
  const tasksHtml=ph.tasks.map((t,j)=>{
    const done=p.checks[viewIdx][j];
    return `<div class="task ${done?'done':''}">
      ${done?'<div class="t-check">✓</div>':''}
      <div class="t-label">${esc(t)}</div>
      ${done
        ? `<button class="t-btn undo" onclick="toggleTask('${id}',${viewIdx},${j})">تراجع</button>`
        : `<button class="t-btn send" onclick="toggleTask('${id}',${viewIdx},${j})">إرسال ✓</button>`}
    </div>`;
  }).join('');

  // صندوق الإتمام
  let finishHtml='';
  if(p.completed){
    finishHtml=`<div class="finish-done"><div class="fd-ic">🎉</div><div class="fd-title">المشروع مُسلّم ومكتمل</div></div>`;
  }else if(canFinish(p)){
    finishHtml=`<div class="finish-box finish-ready">
      <div class="fr-title">✅ كل المهام مكتملة والمبلغ مستلم بالكامل</div>
      <button class="btn-finish" onclick="finishProject('${id}')">🏁 إتمام وتسليم المشروع</button>
    </div>`;
  }else{
    const reasons=[];
    if(!allTasksDone(p)) reasons.push('إكمال جميع المهام');
    if(remaining(p)>0) reasons.push(`استلام المبلغ المتبقي (${fmtMoney(remaining(p))} ر.س)`);
    if((Number(p.total)||0)<=0) reasons.push('تحديد السعر الإجمالي');
    finishHtml=`<div class="finish-box finish-locked">
      <div class="fl-ic">🔒</div>
      <div class="fl-title">زر الإتمام مقفل</div>
      <div class="fl-sub">يظهر بعد: ${reasons.join(' + ')}</div>
    </div>`;
  }

  return `
    <div class="phase-rail">${rail}</div>
    <div class="phase-open">
      <div class="po-top"><h3>${ph.name}</h3><span class="po-count">${phDone}/${ph.tasks.length} مكتمل</span></div>
      <div class="po-bar"><div class="po-fill" style="width:${phPct}%"></div></div>
    </div>
    <div class="tasks">${tasksHtml}</div>
    <div class="phase-nav">
      ${viewIdx>0?`<button class="btn btn-ghost" style="background:#EAF1F0;color:var(--teal)" onclick="switchPhase('${id}',${viewIdx-1})">▶ السابقة</button>`:''}
      ${viewIdx<PHASES.length-1?`<button class="btn btn-gold" onclick="switchPhase('${id}',${viewIdx+1})">التالية ◀</button>`:''}
    </div>
    <div class="sec-title">إتمام المشروع</div>
    ${finishHtml}`;
}

/* تبويب البريف */
function renderBriefTab(p,id){
  const fields=BRIEF_FIELDS.map(f=>{
    const val=esc(p.brief[f.k]||'');
    const input = f.type==='area'
      ? `<textarea rows="2" id="br-${f.k}" placeholder="${f.hint}">${val}</textarea>`
      : `<input id="br-${f.k}" value="${val}" placeholder="${f.hint}">`;
    return `<div class="brief-field"><label>${f.label}</label>${input}<div class="brief-hint">${f.hint}</div></div>`;
  }).join('');
  return `
    <div style="background:#FBEEDF;border:1px solid #F0D5B5;border-radius:12px;padding:12px 14px;margin-bottom:16px;font-size:13px;color:#8a5a2a">
      📋 هذا البريف وثيقتك الرسمية مع العميل — يحميك من تضارب الآراء. املأه، ثم اطبعه/صدّره وأرسله للعميل لتأكيد الموافقة.
    </div>
    ${fields}
    <div class="brief-save">
      <button class="btn btn-teal" style="flex:1;justify-content:center" onclick="saveBrief('${id}')">💾 حفظ البريف</button>
      <button class="btn btn-gold" onclick="printBrief('${id}')">🖨 طباعة/تصدير PDF</button>
    </div>`;
}

/* تبويب الدفعات */
function renderPayTab(p,id){
  const paid=totalPaid(p), rem=remaining(p), total=Number(p.total)||0;
  const items=(p.payments||[]).map((pay,i)=>`
    <div class="pay-item">
      <div><span class="pi-amt">${fmtMoney(pay.amount)} ر.س</span></div>
      <div style="display:flex;align-items:center;gap:12px">
        <span class="pi-date">${esc(pay.date)}${pay.label?' • '+esc(pay.label):''}</span>
        ${p.completed?'':`<button class="pi-del" onclick="delPayment('${id}',${i})">🗑</button>`}
      </div>
    </div>`).join('');
  return `
    ${p.completed?'':`<div class="pay-add">
      <div class="pay-add-row">
        <div class="field"><label>مبلغ الدفعة (ر.س)</label><input type="number" id="pay-amt" min="0" placeholder="مثال: 1000"></div>
        <div class="field"><label>وصف (اختياري)</label><input id="pay-label" placeholder="عربون / دفعة أولى..."></div>
        <button class="pay-btn" onclick="addPayment('${id}')">✓ تم استلام المبلغ</button>
      </div>
    </div>`}
    <div class="sec-title">سجل الدفعات</div>
    ${items||'<p style="color:var(--muted);font-size:14px;text-align:center;padding:20px">لا توجد دفعات مسجّلة بعد</p>'}
    <div class="pay-summary">
      <div class="ps"><div class="l">السعر الإجمالي</div><div class="v">${fmtMoney(total)}</div></div>
      <div class="ps paid"><div class="l">المدفوع</div><div class="v">${fmtMoney(paid)}</div></div>
      <div class="ps rem ${rem<=0?'zero':''}"><div class="l">المتبقي</div><div class="v">${fmtMoney(rem)}</div></div>
    </div>`;
}

async function persist(p){
  setSync('loading','جاري الحفظ…');
  try{
    const r=await apiCall('save','POST',{
      id:p.id,name:p.name,pkg:p.pkg,stage:currentPhase(p),start:p.start,end:p.end,
      paid:totalPaid(p),rem:remaining(p),total:p.total,note:p.note,
      checks:p.checks,brief:p.brief,payments:p.payments,completed:p.completed
    });
    if(r.error) throw new Error(r.error);
    setSync('ok','متزامن ✓');
  }catch(e){ setSync('err','فشل الحفظ'); alert('تعذّر الحفظ: '+e.message); }
}

async function toggleTask(id,phaseIdx,taskIdx){
  const p=projects.find(x=>x.id===id);
  p.checks[phaseIdx][taskIdx]=!p.checks[phaseIdx][taskIdx];
  p.stage=currentPhase(p);
  openDetail(id); render(); await persist(p);
}

async function saveBrief(id){
  const p=projects.find(x=>x.id===id);
  BRIEF_FIELDS.forEach(f=>{ const el=document.getElementById('br-'+f.k); if(el) p.brief[f.k]=el.value.trim(); });
  await persist(p);
  alert('✅ تم حفظ البريف');
}

function printBrief(id){
  const p=projects.find(x=>x.id===id);
  // حفظ أولًا
  BRIEF_FIELDS.forEach(f=>{ const el=document.getElementById('br-'+f.k); if(el) p.brief[f.k]=el.value.trim(); });
  const rows=BRIEF_FIELDS.map(f=>`<tr><td style="font-weight:600;color:#2E4F4F;width:35%;vertical-align:top;padding:10px;border:1px solid #ECE4E4">${f.label}</td><td style="padding:10px;border:1px solid #ECE4E4;white-space:pre-wrap">${esc(p.brief[f.k]||'—')}</td></tr>`).join('');
  const w=window.open('','_blank');
  w.document.write(`<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>بريف ${esc(p.name)}</title>
    <style>body{font-family:'IBM Plex Sans Arabic',Arial,sans-serif;padding:40px;color:#1F2D2D}
    h1{color:#2E4F4F}h1 b{color:#D88935}.head{border-bottom:3px solid #D88935;padding-bottom:14px;margin-bottom:20px}
    table{width:100%;border-collapse:collapse;margin-top:14px}.meta{color:#7C8B8B;font-size:14px}
    .sign{margin-top:40px;display:flex;justify-content:space-between}.sign div{width:45%;border-top:1px solid #1F2D2D;padding-top:8px;text-align:center;font-size:14px}</style></head>
    <body><div class="head"><h1>حِـ<b>رف</b> — بريف مشروع رسمي</h1>
    <div class="meta">المتجر: ${esc(p.name)} • الباقة: ${esc(p.pkg)} • السعر: ${fmtMoney(p.total)} ر.س • التاريخ: ${fmtDate(p.start)}</div></div>
    <table>${rows}</table>
    <div class="sign"><div>توقيع العميل</div><div>توقيع حِرف</div></div>
    <script>window.onload=()=>window.print()<\/script></body></html>`);
  w.document.close();
}

async function addPayment(id){
  const p=projects.find(x=>x.id===id);
  const amt=parseFloat(document.getElementById('pay-amt').value);
  if(!amt||amt<=0){ alert('اكتب مبلغ الدفعة'); return; }
  const label=document.getElementById('pay-label').value.trim();
  const today=new Date();
  const date=`${today.getDate()}/${today.getMonth()+1}/${today.getFullYear()}`;
  p.payments.push({amount:amt,date,label});
  openDetail(id); render(); await persist(p);
}
async function delPayment(id,i){
  const p=projects.find(x=>x.id===id);
  if(!confirm('حذف هذه الدفعة؟')) return;
  p.payments.splice(i,1);
  openDetail(id); render(); await persist(p);
}

async function finishProject(id){
  const p=projects.find(x=>x.id===id);
  if(!p){ alert('خطأ: لم يُعثر على المشروع'); return; }
  if(!canFinish(p)){ alert('لا يمكن الإتمام: تأكد من إكمال كل المهام واستلام كامل المبلغ'); return; }
  if(!confirm('تأكيد إتمام وتسليم المشروع؟ سيُغلق كمكتمل.')) return;
  // عيّن الحالة واحفظ أولًا، ثم أعد الرسم بعد نجاح الحفظ
  p.completed=1;
  activeTab[id]='tasks'; // ارجع لتبويب المهام ليظهر شعار الإتمام
  setSync('loading','جاري الحفظ…');
  try{
    const r=await apiCall('save','POST',{
      id:p.id,name:p.name,pkg:p.pkg,stage:currentPhase(p),start:p.start,end:p.end,
      paid:totalPaid(p),rem:remaining(p),total:p.total,note:p.note,
      checks:p.checks,brief:p.brief,payments:p.payments,completed:1
    });
    if(r.error) throw new Error(r.error);
    setSync('ok','متزامن ✓');
    render();
    openDetail(id);
    alert('🎉 تم إتمام المشروع وتسليمه بنجاح');
  }catch(e){
    p.completed=0; // تراجع عند الفشل
    setSync('err','فشل الحفظ');
    alert('تعذّر حفظ الإتمام: '+e.message+'\nأعد المحاولة.');
  }
}

/* ===== النموذج ===== */
function openForm(){
  editingId=null;
  document.getElementById('formTitle').textContent='متجر جديد';
  ['f-name','f-total','f-note','f-start','f-end'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('f-pkg').value='نواة';
  document.getElementById('formOverlay').classList.add('open');
}
function editProject(id){
  const p=projects.find(x=>x.id===id); if(!p) return;
  editingId=id; closeDetail();
  document.getElementById('formTitle').textContent='تعديل المتجر';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-pkg').value=p.pkg;
  document.getElementById('f-total').value=p.total||'';
  document.getElementById('f-start').value=p.start||'';
  document.getElementById('f-end').value=p.end||'';
  document.getElementById('f-note').value=p.note||'';
  document.getElementById('formOverlay').classList.add('open');
}
function closeForm(){ document.getElementById('formOverlay').classList.remove('open'); }

async function saveProject(){
  const name=document.getElementById('f-name').value.trim();
  if(!name){ alert('اكتب اسم المتجر أولًا'); return; }
  const data={
    name, pkg:document.getElementById('f-pkg').value,
    total:parseFloat(document.getElementById('f-total').value)||0,
    start:document.getElementById('f-start').value,
    end:document.getElementById('f-end').value,
    note:document.getElementById('f-note').value.trim()
  };
  document.getElementById('saveBtn').textContent='جاري الحفظ…';
  if(editingId){
    const p=projects.find(x=>x.id===editingId);
    Object.assign(p,data);
    await persist(p);
  }else{
    const np={...data, id:'p'+Date.now(),
      checks:PHASES.map(ph=>new Array(ph.tasks.length).fill(false)),
      brief:{}, payments:[], completed:0, stage:0};
    projects.unshift(np);
    await persist(np);
  }
  document.getElementById('saveBtn').textContent='حفظ المشروع';
  closeForm(); render();
}
async function delProject(id){
  if(!confirm('متأكد من حذف هذا المتجر؟ لا يمكن التراجع.')) return;
  setSync('loading','جاري الحذف…');
  try{
    const r=await apiCall('delete','GET',null,'&id='+encodeURIComponent(id));
    if(r.error) throw new Error(r.error);
    projects=projects.filter(x=>x.id!==id);
    setSync('ok','متزامن ✓'); closeDetail(); render();
  }catch(e){ setSync('err','فشل الحذف'); alert('تعذّر الحذف: '+e.message); }
}

document.getElementById('detailOverlay').addEventListener('click',e=>{if(e.target.id==='detailOverlay')closeDetail();});
document.getElementById('formOverlay').addEventListener('click',e=>{if(e.target.id==='formOverlay')closeForm();});

loadProjects();
</script>
